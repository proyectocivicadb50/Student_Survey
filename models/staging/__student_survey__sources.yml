version: 2

sources:
  - name: student_survey
    database: dev_bronze_db
    schema: kaggle 
    description: "Fuente de datos crudos de la encuesta de estudiantes sobre salud mental y redes sociales."
    tables:
      - name: student_survey
        description: "Tabla con los resultados completos de la encuesta."
        columns:
          - name: TIMESTAMP
            description: "Fecha y hora de registro."
            tests:
              - not_null

          - name: AGE
            tests:
              - not_null

          - name: GENDER
            tests:
              - accepted_values:
                  arguments:
                    values: ["Male", "Female"]

          - name: RESIDENCE_AREA
            tests:
              - accepted_values:
                  arguments:
                    values: ["Urban", "Rural"]

          - name: EDUCATION_LEVEL
            description: "Nivel de educación del estudiante."

          - name: SOCIOECONOMIC_STATUS
            description: "Estatus socioeconómico basado en los padres."

          - name: STUDY_TIME_HOURS
            description: "Tiempo de estudio reportado."

          - name: ATTENDANCE_RATE_PERCENTILE
            description: "Tasa de asistencia."

          - name: SOCIAL_MEDIA_PLATFORM
            tests:
              - accepted_values:
                  arguments:
                    values: ["YouTube", "Instagram", "Facebook", "TikTok", "Other"]

          - name: TIME_SPENT_SOCIAL_MEDIA_HOURS
            description: "Horas diarias en redes sociales."

          - name: MOST_TIME_SPENT_IN_A_DAY
            description: "Momento del día con mayor uso."

          - name: PHYSICAL_ACTIVITY
            tests:
              - accepted_values:
                  arguments:
                    values: ["Yes", "No"]

          - name: WITHDRAWAL_SYMPTOMS
            description: "Síntomas de abstinencia reportados."

          - name: SLEEP_DISTURBANCE_ON_SLEEP_QUALITY
            tests:
              - accepted_values:
                  arguments:
                    values: [1, 2, 3, 4, 5]
                    quote: false

          - name: MOOD_MODIFICATION_SCALE
            tests:
              - accepted_values:
                  arguments:
                    values: [1, 2, 3, 4, 5]
                    quote: false

          - name: ANXIETY_SCALE
            tests:
              - accepted_values:
                  arguments:
                    values: [1, 2, 3, 4, 5]
                    quote: false

          - name: DEPRESSION_SCALE
            tests:
              - accepted_values:
                  arguments:
                    values: [1, 2, 3, 4, 5]
                    quote: false

          - name: SELF_ESTEEM_SCALE
            tests:
              - accepted_values:
                  arguments:
                    values: [1, 2, 3, 4, 5]
                    quote: false

          - name: LAST_ACADEMIC_RESULTS
            description: "Último promedio académico."

          - name: SOCIAL_MEDIA_DISTRACTION_DURING_ACADEMIC_ACTIVITIES
            description: "Nivel de distracción por redes en clase."

          - name: COLUMN_19
            description: "Columna de datos adicionales o sin etiqueta clara."

          - name: HOURS_EXERCISE_PER_WEEK
            description: "Horas de ejercicio semanales."

          - name: EXERCISE_FREQUENCY
            tests:
              - accepted_values:
                  arguments:
                    values: ["Low", "Medium", "High"]

          - name: EXERCISE_TYPE
            description: "Tipo de ejercicio realizado."

          - name: NATIONALITY
            description: "Nacionalidad del encuestado."