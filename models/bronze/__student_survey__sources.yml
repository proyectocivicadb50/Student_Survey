version: 2

sources:
  - name: student_survey
    database: dev_bronze_db
    schema: kaggle 
    description: "Fuente de datos crudos de la encuesta de estudiantes sobre salud mental y redes sociales."
    tables:
      - name: survey_1000
        description: "Tabla con los resultados completos de la encuesta de 1000 registros una vez procesada."
        columns:
          - name: TIMESTAMP
            description: "Fecha y hora exacta en la que el estudiante registró sus respuestas en el formulario."
            data_tests:
              - not_null

          - name: AGE
            description: "Edad del estudiante encuestado (valor numérico entero)."
            data_tests:
              - not_null

          - name: GENDER
            description: "Género autoidentificado del encuestado."
            data_tests:
              - accepted_values:
                  arguments:
                    values: ["Male", "Female"]

          - name: RESIDENCE_AREA
            description: "Zona residencial donde habita el estudiante."
            data_tests:
              - accepted_values:
                  arguments:
                    values: ["Urban", "Rural"]

          - name: EDUCATION_LEVEL
            description: "Nivel de educación formal actual del estudiante."
            data_tests:
              - accepted_values:
                  arguments:
                    values: ["Tertiary Education", "SSC / O Level", "HSC / A Level"]

          - name: SOCIOECONOMIC_STATUS
            description: "Estatus socioeconómico aproximado basado en el nivel máximo de estudios de los padres."
            data_tests:
              - accepted_values:
                  arguments:
                    values: ["Tertiary Education", "SSC / O Level", "HSC / A Level","No education","Madrasah"] 

          - name: STUDY_TIME_HOURS
            description: "Tiempo estimado de estudio diario reportado autónomamente (número entero de horas)."

          - name: ATTENDANCE_RATE_PERCENTILE
            description: "Tasa de asistencia a clases expresada numéricamente como porcentaje en formato entero."
            data_tests:
              - dbt_expectations.expect_column_values_to_be_between:
                  arguments:
                    min_value: 0
                    max_value: 100
              

          - name: SOCIAL_MEDIA_PLATFORM
            description: "Red social principal o en la que el estudiante invierte la mayor cantidad de tiempo."
            data_tests:
              - accepted_values:
                  arguments:
                    values: ["YouTube", "Instagram", "Facebook", "TikTok", "Other"]

          - name: TIME_SPENT_SOCIAL_MEDIA_HOURS
            description: "Cantidad total de horas diarias consumidas en plataformas de redes sociales (número entero)."
            

          - name: MOST_TIME_SPENT_IN_A_DAY
            description: "Momento preferente del día en el que se registra el pico más alto de uso de redes sociales."
            data_tests:
              - accepted_values:
                  arguments:
                    values: ["Night", "Morning", "Evening", "Afternoon"]

          - name: PHYSICAL_ACTIVITY
            description: "Indicador binario sobre si realiza al menos 30 minutos de actividad física al día."
            data_tests:
              - accepted_values:
                  arguments:
                    values: ["Yes", "No"]

          - name: WITHDRAWAL_SYMPTOMS
            description: "Efectos secundarios psicológicos o fisiológicos detectados al no tener acceso a redes sociales."
            data_tests:
              - accepted_values:
                  arguments:
                    values: ["Trouble concentrating", "No symtoms", "Irritability or agitation", "Feeling restless", "Cravings"]

          - name: SLEEP_DISTURBANCE_ON_SLEEP_QUALITY
            description: "Métrica en escala del 1 al 5 que mide el impacto negativo de las redes en la calidad del sueño."
            data_tests:
              - accepted_values:
                  arguments:
                    values: [1, 2, 3, 4, 5]

          - name: MOOD_MODIFICATION_SCALE
            description: "Escala psicológica del 1 al 5 que evalúa la alteración del estado de ánimo por uso de pantallas."
            data_tests:
              - accepted_values:
                  arguments:
                    values: [1, 2, 3, 4, 5]

          - name: ANXIETY_SCALE
            description: "Nivel autodiagnosticado o medido de ansiedad en una escala del 1 al 5."
            data_tests:
              - accepted_values:
                  arguments:
                    values: [1, 2, 3, 4, 5]

          - name: DEPRESSION_SCALE
            description: "Nivel medido de sintomatología depresiva en una escala del 1 al 5."
            data_tests:
              - accepted_values:
                  arguments:
                    values: [1, 2, 3, 4, 5]

          - name: SELF_ESTEEM_SCALE
            description: "Métrica de percepción de autoestima del estudiante en escala numérica de valoración del 1 al 5."
            data_tests:
              - accepted_values:
                  arguments:
                    values: [1, 2, 3, 4, 5]

          - name: LAST_ACADEMIC_RESULTS
            description: "Último promedio académico de calificaciones finales (GPA/CGPA) normalizado en escala decimal de 0 a 5."

          - name: SOCIAL_MEDIA_DISTRACTION_DURING_ACADEMIC_ACTIVITIES
            description: "Frecuencia o nivel de distracción que causan las notificaciones y redes durante las horas de clase."

          - name: COLUMN_19
            description: "Campo auxiliar o columna de control técnico dentro del set de datos crudos."

          - name: HOURS_EXERCISE_PER_WEEK
            description: "Cantidad agregada de horas semanales dedicadas a realizar ejercicio físico."

          - name: EXERCISE_FREQUENCY
            description: "Clasificación cualitativa de la regularidad deportiva del estudiante."
            data_tests:
              - accepted_values:
                  arguments:
                    values: ["Low", "Medium", "High"]

          - name: EXERCISE_TYPE
            description: "Disciplina o tipo de actividad deportiva predominante practicada (ej. Cardio, Team Sports, Gym)."
            data_tests:
              - accepted_values:
                  arguments:
                    values: ["Team Sports", "Gym", "Cardio",""]

          - name: NATIONALITY
            description: "Nacionalidad de origen informada por el estudiante encuestado (cruzar con la tabla paises_seed)."